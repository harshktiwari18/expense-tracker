<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A simple and elegant expense tracker to manage your finances.">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Expense Tracker</h1>
            <button id="logout-btn" class="btn-small">Logout</button>
        </header>

        <section class="balance-card">
            <h2>Your Balance</h2>
            <h1 id="balance">₹0.00</h1>
            
            <div class="inc-exp-container">
                <div>
                    <h3>Income</h3>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div class="divider"></div>
                <div>
                    <h3>Expense</h3>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>
        </section>

        <div class="content-wrapper">
            <section class="history-section">
                <h3>Transaction History</h3>
                <ul id="list" class="list">
                    <!-- Transactions will appear here -->
                </ul>
            </section>

            <section class="add-transaction-section">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Groceries..." required />
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount <br>
                            <small>(negative - expense, positive - income)</small>
                        </label>
                        <input type="number" id="amount" placeholder="Enter amount..." step="0.01" required />
                    </div>
                    <button class="btn">Add Transaction</button>
                </form>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
